<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pengumuman Kelulusan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      padding: 40px;
    }

    .box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    input, button {
      padding: 10px;
      margin: 10px;
      width: 80%;
    }
  </style>
</head>
<body>

<div class="box">
  <h3>PENGUMUMAN KELULUSAN</h3>

  <input type="text" id="nis" placeholder="Masukkan NIS">
  <br>
  <button onclick="cek()">Cek</button>

  <div id="hasil"></div>
</div>

<script>
function cek() {
  const nis = document.getElementById("nis").value.trim();
  const hasil = document.getElementById("hasil");

  if (!nis) {
    hasil.innerHTML = "Masukkan NIS!";
    return;
  }

  const url = `pdf/${nis}.pdf`;

  // cek apakah file ada
  fetch(url)
    .then(res => {
      if (res.ok) {
        hasil.innerHTML = `
          <p>Data ditemukan</p>
          <a href="${url}" target="_blank">
            <button>Lihat / Download PDF</button>
          </a>
        `;
      } else {
        hasil.innerHTML = "<p style='color:red;'>Data tidak ditemukan</p>";
      }
    })
    .catch(() => {
      hasil.innerHTML = "<p style='color:red;'>Terjadi kesalahan</p>";
    });
}
</script>

</body>
</html>
