<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pengumuman Kelulusan - SMK Yasiha Gubug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --primary-color: #d32f2f;
      --overlay-color: rgba(255, 255, 255, 0.8); /* Lebih transparan agar bg menyatu */
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      
      background-image: url('spmb-baru.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.2); /* Gelap tipis agar background tetap cerah */
      z-index: -1;
    }

    .box {
      background: var(--overlay-color);
      padding: 20px 25px; /* Padding diperkecil */
      border-radius: 15px;
      max-width: 320px; /* Ukuran kotak diperkecil dari 420px ke 320px */
      width: 85%;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border-top: 6px solid var(--primary-color);
      position: relative;
      backdrop-filter: blur(8px); /* Blur lebih kuat untuk estetika modern */
      text-align: center;
    }

    .logo-img {
      width: 70px; /* Logo diperkecil */
      margin-bottom: 10px;
    }

    h2 {
      margin: 0;
      color: #333;
      font-size: 1.1em; /* Ukuran teks diperkecil */
      letter-spacing: 0.5px;
    }

    h3 {
      color: var(--primary-color);
      margin: 5px 0 15px 0;
      font-size: 1em;
      text-transform: uppercase;
    }

    p {
      font-size: 0.85em;
      color: #444;
      margin-bottom: 10px;
    }

    input {
      padding: 10px;
      margin: 8px 0;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 12px;
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #b71c1c;
    }

    #hasil {
      margin-top: 15px;
      font-size: 0.9em;
    }

    .footer-text {
      margin-top: 15px;
      font-size: 0.7em;
      color: #666;
      border-top: 1px solid rgba(0,0,0,0.1);
      padding-top: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="smk-yasiha-gubug.png" alt="Logo" class="logo-img">
  <h2>SMK YASIHA GUBUG</h2>
  <h3>Pengumuman Kelulusan Tahun Pelajaran 2025/2026</h3>

  <p>Masukkan NISN Anda:</p>
  <input type="text" id="nisn" placeholder="Nomor Induk Siswa Nasional">
  <button onclick="cek()">LIHAT HASIL</button>

  <div id="hasil"></div>

  <div class="footer-text">
    <strong>PPDB SMK YASIHA</strong> sedang dibuka!<br>
    Info: 0858-7775-5164
  </div>
</div>

<script>
function cek() {
  const nisn = document.getElementById("nisn").value.trim();
  const hasil = document.getElementById("hasil");
  if (!nisn) {
    hasil.innerHTML = "<span style='color:orange;'>Isi NISN dahulu!</span>";
    return;
  }
  const url = `pdfok/${nisn}.pdf`;
  fetch(url).then(res => {
    if (res.ok) {
      hasil.innerHTML = `<a href="${url}" target="_blank"><button style="background:#2e7d32">DOWNLOAD SKL (PDF)</button></a>`;
    } else {
      hasil.innerHTML = "<span style='color:red;'>NISN tidak ditemukan</span>";
    }
  }).catch(() => {
    hasil.innerHTML = "Terjadi kesalahan";
  });
}
</script>

</body>
</html>
