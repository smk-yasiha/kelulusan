<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Pengumuman Kelulusan - SMK Yasiha Gubug</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --primary-color: #d32f2f;
      --overlay-color: rgba(255, 255, 255, 0.85); /* Transparansi kotak putih */
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      
      /* Pengaturan Background Gambar */
      background-image: url('spmb-baru.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* Overlay gelap agar background tidak terlalu mengganggu teks */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3); /* Memberi efek agak gelap pada gambar */
      z-index: -1;
    }

    .box {
      background: var(--overlay-color);
      padding: 40px 30px;
      border-radius: 20px;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border-top: 8px solid var(--primary-color);
      position: relative;
      backdrop-filter: blur(5px); /* Efek blur pada kotak agar lebih modern */
    }

    .logo-img {
      width: 100px;
      margin-bottom: 15px;
    }

    h2 {
      margin: 0;
      color: #333;
      font-size: 1.5em;
    }

    h3 {
      color: var(--primary-color);
      margin-bottom: 20px;
    }

    input {
      padding: 15px;
      margin: 10px 0;
      width: 100%;
      box-sizing: border-box;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      padding: 15px;
      width: 100%;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #b71c1c;
      transform: scale(1.02);
    }

    #hasil {
      margin-top: 20px;
      font-weight: bold;
    }

    .footer-text {
      margin-top: 20px;
      font-size: 0.8em;
      color: #555;
    }
  </style>
</head>
<body>

<div class="box">
  <img src="smk-yasiha-gubug.png" alt="Logo" class="logo-img">
  <h2>SMK YASIHA GUBUG</h2>
  <h3>Cek Kelulusan</h3>

  <p>Masukkan NIS untuk melihat hasil:</p>
  <input type="text" id="nis" placeholder="Contoh: 12345">
  <button onclick="cek()">LIHAT HASIL</button>

  <div id="hasil"></div>

  <div class="footer-text">
    Penerimaan Siswa Baru sedang dibuka!<br>
    Hubungi: 0858-7775-5164
  </div>
</div>

<script>
function cek() {
  const nis = document.getElementById("nis").value.trim();
  const hasil = document.getElementById("hasil");
  if (!nis) {
    hasil.innerHTML = "<span style='color:orange;'>Isi NIS dahulu!</span>";
    return;
  }
  const url = `pdf/${nis}.pdf`;
  fetch(url).then(res => {
    if (res.ok) {
      hasil.innerHTML = `<a href="${url}" target="_blank"><button style="background:#2e7d32">DOWNLOAD SKL</button></a>`;
    } else {
      hasil.innerHTML = "<span style='color:red;'>Data tidak ditemukan</span>";
    }
  }).catch(() => {
    hasil.innerHTML = "Terjadi kesalahan";
  });
}
</script>

</body>
</html>
